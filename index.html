<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Notes</title>

  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#000000" />
  <link rel="icon" type="image/png" href="icon-192.png" />
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">

  <!-- Bootstrap -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <!-- Bootstrap Icons -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
  />

  <style>
    *, *::before, *::after { box-sizing: border-box; }

    /* ---- THEME VARIABLES ---- */
    :root {
      --bg:               #0e0d12;
      --bg-card:          #1a1a20;
      --bg-hover:         #131317;
      --bg-active:        #1e1e2e;
      --bg-code:          #131317;
      --border:           #252525;
      --text:             #e8e8e8;
      --text-secondary:   #ccc;
      --text-muted:       #666;
      --text-placeholder: #555;
      --input-border:     #333;
      --input-focus:      #555;
      --accent:           #6ea8fe;
      --divider-color:    #444;
    }

    body.light-theme {
      --bg:               #f5f5f7;
      --bg-card:          #ffffff;
      --bg-hover:         #ebebeb;
      --bg-active:        #e8f0fe;
      --bg-code:          #f0f0f0;
      --border:           #e0e0e0;
      --text:             #1a1a20;
      --text-secondary:   #555;
      --text-muted:       #888;
      --text-placeholder: #aaa;
      --input-border:     #ddd;
      --input-focus:      #aaa;
      --accent:           #1a73e8;
      --divider-color:    #aaa;
    }

    body {
      background: var(--bg);
      color: var(--text);
      margin: 0;
      overflow: hidden;
    }

    /* ---- LAYOUT ---- */
    .app-wrapper {
      display: flex;
      height: 100vh;
      overflow: hidden;
      position: relative;
    }

    .panel-left {
      display: flex;
      flex-direction: column;
      width: 100%;
      transition: width 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      overflow: hidden;
    }

    .panel-left.split {
      width: 50%;
      min-width: 200px;
      border-right: 1px solid var(--border);
    }

    .panel-right {
      display: flex;
      flex-direction: column;
      width: 0;
      overflow: hidden;
      transition: width 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .panel-right.open {
      width: 50%;
    }

    .panel-header {
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 8px 12px;
      flex-shrink: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }

    .panel-content {
      overflow-y: auto;
      flex: 1;
      padding: 8px;
    }

    .add-note-bar {
      padding: 6px 8px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .add-note-input {
      width: 100%;
      background: var(--bg-card);
      border: 1px solid var(--input-border);
      border-radius: 4px;
      color: var(--text);
      padding: 5px 10px;
      font-size: 0.78rem;
      outline: none;
    }

    .add-note-input::placeholder {
      color: var(--text-placeholder);
    }

    .add-note-input:focus {
      border-color: var(--input-focus);
    }

    /* ---- NOTES ---- */
    .note {
      background: var(--bg-card);
      border: none;
      border-radius: 6px;
      padding: 5px 10px;
      margin-bottom: 5px;
    }

    .note-active {
      background: var(--bg-active) !important;
      border-left: 2px solid var(--accent);
    }

    .note:hover {
      background: var(--bg-hover);
    }

    .note-title {
      font-weight: normal;
      font-size: 0.78rem;
      outline: none;
      word-break: break-word;
      overflow-wrap: break-word;
      min-width: 0;
    }

    .note-content {
      margin-top: 8px;
      outline: none;
      white-space: pre-wrap;
      font-size: 0.78rem;
      color: var(--text-secondary);
    }

    .note-content a, .note-title a {
      color: var(--accent);
      text-decoration: underline;
      word-break: break-all;
    }

    .note-content pre {
      background: var(--bg-code);
      padding: 10px;
      border-radius: 6px;
    }

    .note-content code {
      background: var(--bg-code);
      padding: 2px 4px;
      border-radius: 4px;
    }

    .note-actions {
      display: flex;
      gap: 4px;
      align-items: center;
    }

    .note-actions button {
      min-width: 28px;
      padding: 2px 5px;
      font-size: 0.7rem;
    }

    .note-actions button i {
      font-size: 0.75rem;
    }

    .note .icon-btn {
      min-width: 28px;
      padding: 2px 5px;
    }

    .note .icon-btn i {
      font-size: 0.75rem;
    }

    .icon-btn i {
      font-size: 1.1rem;
    }

    #toggleAllIcon {
      transition: transform 0.2s ease;
    }

    .note-completed {
      opacity: 0.5;
    }

    .note-completed .note-title {
      text-decoration: line-through;
      color: var(--text-muted) !important;
    }

    .check-btn {
      font-size: 1.35rem;
      line-height: 1;
      color: var(--text-placeholder);
      transition: color 0.15s;
      padding: 0;
      border: none;
      background: transparent;
    }

    .check-btn:hover { color: #e53935 !important; }
    .check-btn.checked { color: #e53935; }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #e53935;
      flex-shrink: 0;
    }

    .note-count {
      font-size: 0.65rem;
      color: #4caf50;
      flex-shrink: 0;
    }

    .note-date {
      font-size: 0.65rem;
      color: #f5c542;
      flex-shrink: 0;
    }

    .completed-divider {
      border-top: 1px solid var(--border);
      padding-top: 10px;
      margin: 16px 0 12px;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--divider-color);
      text-align: center;
    }

    /* ---- ANIMATIONS ---- */
    @keyframes noteEnter {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes noteExit {
      from { opacity: 1; transform: translateY(0); }
      to   { opacity: 0; transform: translateY(-10px); }
    }

    .note-enter { animation: noteEnter 0.18s ease forwards; }
    .note-exit  { animation: noteExit  0.18s ease forwards; }

    #detailTitle {
      font-size: 0.8rem;
    }

    #detailTitle a {
      color: inherit;
      text-decoration: underline;
    }

    /* ---- LIGHT THEME BUTTON OVERRIDES ---- */
    body.light-theme .btn-outline-light {
      --bs-btn-color: #333;
      --bs-btn-border-color: #bbb;
      --bs-btn-hover-bg: #e0e0e0;
      --bs-btn-hover-color: #111;
      --bs-btn-hover-border-color: #999;
      --bs-btn-active-bg: #d0d0d0;
      --bs-btn-active-color: #111;
    }

    body.light-theme .btn-light {
      --bs-btn-bg: #333;
      --bs-btn-color: #fff;
      --bs-btn-border-color: #333;
      --bs-btn-hover-bg: #555;
      --bs-btn-hover-color: #fff;
      --bs-btn-hover-border-color: #555;
    }

    /* ---- TOOLTIPS ---- */
    [data-tooltip] {
      position: relative;
    }

    [data-tooltip]::after {
      content: attr(data-tooltip);
      position: absolute;
      bottom: unset;
      top: calc(100% + 6px);
      left: 50%;
      transform: translateX(-50%);
      background: #222;
      color: #e8e8e8;
      padding: 3px 8px;
      border-radius: 4px;
      font-size: 0.7rem;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s;
      z-index: 100;
      border: 1px solid #444;
    }

    [data-tooltip]:hover::after {
      opacity: 1;
    }

    #themeToggle[data-tooltip]::after {
      left: unset;
      right: 0;
      transform: none;
    }

    /* ---- DIVIDER ---- */
    #panelDivider {
      width: 4px;
      flex-shrink: 0;
      background: var(--border);
      cursor: col-resize;
      display: none;
      transition: background 0.15s;
      z-index: 5;
    }

    #panelDivider.active {
      display: block;
    }

    #panelDivider:hover,
    #panelDivider.dragging {
      background: var(--accent);
    }

    /* ---- MOBILE ---- */
    @media (max-width: 768px) {
      #panelDivider { display: none !important; }
      .panel-left,
      .panel-right {
        position: absolute;
        top: 0;
        left: 0;
        width: 100% !important;
        height: 100%;
        min-width: unset !important;
        border-right: none !important;
        transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      }

      .panel-left {
        transform: translateX(0);
        z-index: 1;
      }

      .panel-left.split {
        transform: translateX(-100%);
      }

      .panel-right {
        transform: translateX(100%);
        z-index: 2;
      }

      .panel-right.open {
        transform: translateX(0);
      }
    }
  </style>
</head>

<body>

<div class="app-wrapper">

  <!-- LEFT PANEL: note list -->
  <div id="panelLeft" class="panel-left">
    <div class="panel-header">
      <h5 class="m-0">🗂 Notes</h5>
      <div class="d-flex gap-2 flex-wrap">
        <button id="exportNotes" class="btn btn-outline-light btn-sm icon-btn" data-tooltip="Export">
          <i class="bi bi-upload"></i>
        </button>
        <button id="importBtn" class="btn btn-outline-light btn-sm icon-btn" data-tooltip="Import">
          <i class="bi bi-download"></i>
        </button>
        <input id="importNotes" type="file" hidden />
        <button id="themeToggle" class="btn btn-outline-light btn-sm icon-btn" data-tooltip="Toggle dark mode">
          <i class="bi bi-sun"></i>
        </button>
      </div>
    </div>
    <div class="add-note-bar">
      <input id="addNoteInput" type="text" class="add-note-input" placeholder="New note…" />
    </div>
    <div id="notesListContainer" class="panel-content"></div>
  </div>

  <!-- DIVIDER -->
  <div id="panelDivider"></div>

  <!-- RIGHT PANEL: note detail -->
  <div id="panelRight" class="panel-right">
    <div class="panel-header">
      <div class="d-flex align-items-center gap-2" style="min-width:0; overflow:hidden;">
        <button id="closeDetail" class="btn btn-outline-light btn-sm icon-btn flex-shrink-0" title="Close">
          <i class="bi bi-x-lg"></i>
        </button>
        <span id="detailTitle" class="m-0 fw-semibold text-truncate"></span>
      </div>
      <div class="d-flex gap-2 flex-shrink-0">
        <button id="toggleAll" class="btn btn-outline-light btn-sm icon-btn" title="Collapse all">
          <i id="toggleAllIcon" class="bi bi-arrows-collapse"></i>
          <span id="toggleAllText" class="d-none d-sm-inline ms-1">Collapse</span>
        </button>
        <button id="addSectionBtn" class="btn btn-light btn-sm fw-semibold icon-btn">
          <i class="bi bi-plus-lg"></i>
          <span class="d-none d-sm-inline ms-1">Add</span>
        </button>
      </div>
    </div>
    <div id="notesDetailContainer" class="panel-content"></div>
  </div>

</div>

<!-- Install banner -->
<div id="installBanner"
     class="position-fixed bottom-0 start-0 end-0 p-3 bg-dark text-white d-none"
     style="z-index:1050; border-top:1px solid #333;">
  <div class="d-flex justify-content-between align-items-center">
    <span>Install Notes for a better experience</span>
    <div>
      <button id="installBtn" class="btn btn-light btn-sm me-2">Install</button>
      <button id="dismissInstall" class="btn btn-secondary btn-sm">Dismiss</button>
    </div>
  </div>
</div>

<!-- Update toast -->
<div id="updateToast"
     class="position-fixed bottom-0 end-0 m-3 p-3 bg-dark text-white d-none"
     style="z-index:1050; border:1px solid #333; border-radius:6px;">
  <div class="d-flex align-items-center gap-3">
    <span>New version available</span>
    <button id="refreshApp" class="btn btn-light btn-sm">Refresh</button>
  </div>
</div>

<script src="app.js"></script>
<script>
  let newWorker;

  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("./sw.js").then(registration => {
      registration.addEventListener("updatefound", () => {
        newWorker = registration.installing;
        newWorker.addEventListener("statechange", () => {
          if (
            newWorker.state === "installed" &&
            navigator.serviceWorker.controller
          ) {
            document.getElementById("updateToast")
              ?.classList.remove("d-none");
          }
        });
      });
    });
  }

  document.getElementById("refreshApp")?.addEventListener("click", () => {
    if (newWorker) {
      newWorker.postMessage({ action: "skipWaiting" });
    }
  });

  navigator.serviceWorker?.addEventListener("controllerchange", () => {
    window.location.reload();
  });
</script>

</body>
</html>
